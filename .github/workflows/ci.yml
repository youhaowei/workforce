name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Submodules use SSH URLs; rewrite to HTTPS for CI.
            # All submodule repos are public, so no token needed.
            - name: Checkout submodules
              run: |
                  git config --global url."https://github.com/".insteadOf "git@github.com:"
                  git submodule update --init --recursive --depth=1

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # Bun workspaces resolves all deps (root + submodules) in one pass
            - run: bun install --frozen-lockfile

            # TanStack Router route tree (needed for type-check)
            - name: Generate route tree
              run: bunx @tanstack/router-cli generate

            - name: Type check
              run: bun run type-check

            - name: Lint
              run: bun run lint

            - name: Unit tests
              run: bun run test
