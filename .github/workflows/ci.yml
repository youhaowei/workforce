name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            # SSH→HTTPS rewrite for public submodules, then shared setup script
            - name: Setup
              run: |
                  git config --global url."https://github.com/".insteadOf "git@github.com:"
                  git submodule update --init --recursive --depth=1
                  pnpm install --frozen-lockfile

            # TanStack Router route tree (needed for type-check)
            - name: Generate route tree
              run: pnpm run routes:generate

            - name: Type check
              run: pnpm run type-check

            - name: Lint
              run: pnpm run lint

            - name: Unit tests
              run: pnpm run test
