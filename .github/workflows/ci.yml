name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # SSH→HTTPS rewrite for public submodules, then shared setup script
            - name: Setup
              run: |
                  git config --global url."https://github.com/".insteadOf "git@github.com:"
                  git submodule update --init --recursive --depth=1
                  bun install

            # TanStack Router route tree (needed for type-check)
            - name: Generate route tree
              run: bunx @tanstack/router-cli generate

            - name: Type check
              run: bun run type-check

            - name: Lint
              run: bun run lint

            - name: Unit tests
              run: bun run test
