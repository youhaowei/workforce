<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/workforce-logo.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/workforce-logo-light.svg" media="(prefers-color-scheme: light)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:* ws://localhost:*; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; script-src 'self'" />
    <title>Workforce - Agentic Orchestrator</title>
    <!-- Drag regions — must be in a raw <style> tag, NOT processed by
         Tailwind/Lightning CSS which strips -webkit-app-region as unknown. -->
    <style>
      .titlebar-drag-region { -webkit-app-region: drag; app-region: drag; }
      .titlebar-no-drag { -webkit-app-region: no-drag; app-region: no-drag; }
      /* All interactive elements opt out of drag so they remain clickable
         above the drag-region overlay. */
      button, input, select, textarea, a, [role="button"] {
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
