appId: dev.workforce.app
productName: Workforce

directories:
  output: out
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!node_modules/**/*"

extraMetadata:
  main: dist-electron/main.cjs

asar: true
asarUnpack:
  - dist/**/*
  - "**/*.node"

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  artifactName: "Workforce-${arch}.${ext}"

dmg:
  artifactName: "Workforce-${arch}.dmg"
  title: Workforce
