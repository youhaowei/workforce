appId: com.workforce.app
productName: Workforce
directories:
  output: out
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - dist-server/**/*
  - "!node_modules"
  - "!src"
  - "!src-tauri"
  - "!src-electron"
asarUnpack:
  - dist-server/**/*
extraMetadata:
  main: dist-electron/main.mjs
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: src-tauri/icons/icon.icns
linux:
  target:
    - AppImage
  category: Development
win:
  target:
    - nsis
